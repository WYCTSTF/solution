<!DOCTYPE html> <!-- 声明为 HTML5 文档-->
<html> <!-- <html> 是HTML页面的根元素 -->
	<head> <!-- 包含文档的元(meta)数据 -->
		<meta charset="utf-8"> <!-- 定义网页编码格式为 utf-8 -->
		<title>赶ddl中</title>
		<body>
			<h1>My first title. </h1>
			<p>My first sentence. </p>
		</body>
	</head>
</html>

<!--
	HTML指的是超文本标记语言 HyperText Markup Language
	HTML文档包含了HTML标签和文本内容
	HTML文档也叫做web页面
-->
